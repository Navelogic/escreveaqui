spring.application.name=backend

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_DATABASE}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=EscreveAquiPool

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

spring.cache.type=caffeine
spring.cache.cache-names=notas
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=30s
